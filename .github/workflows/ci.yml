name: continuous-integration

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  checks:
    uses: mixmaxhq/github-workflows-public/.github/workflows/checks.yml@main

  release:
    needs: checks
    if: github.event_name == 'push'
    uses: mixmaxhq/github-workflows-public/.github/workflows/release.yml@main
    secrets: inherit
